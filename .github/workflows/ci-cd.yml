name: Fullstack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_GHCR }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy-dev:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev Server
        run: |
          ssh user@dev-server "
          docker pull ghcr.io/${{ github.repository }}/backend:${{ github.sha }} &&
          docker pull ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} &&
          docker stop backend || true &&
          docker rm backend || true &&
          docker run -d --name backend -p 3002:3000 \
            -e MONGO_URI=mongodb://root:example@mongo:27017/testdb \
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }} &&
          docker stop frontend || true &&
          docker rm frontend || true &&
          docker run -d --name frontend -p 3000:80 \
            -e REACT_APP_API_URL=http://localhost:3002 \
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}"
